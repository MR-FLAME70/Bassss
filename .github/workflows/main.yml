name: Build Windows

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtmultimedia'

      - name: Update / bootstrap vcpkg (reuse runner's pre-installed copy, with retries)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cd $env:VCPKG_INSTALLATION_ROOT

          $maxAttempts = 5
          for ($i = 1; $i -le $maxAttempts; $i++) {
            try {
              Write-Host "Attempt $i/$maxAttempts: updating vcpkg repo..."
              git pull --quiet

              Write-Host "Attempt $i/$maxAttempts: bootstrapping vcpkg..."
              .\bootstrap-vcpkg.bat -disableMetrics
              if ($LASTEXITCODE -ne 0) { throw "bootstrap-vcpkg.bat exited with code $LASTEXITCODE" }

              Write-Host "vcpkg ready."
              break
            } catch {
              Write-Warning "Attempt $i failed: $_"
              if ($i -eq $maxAttempts) {
                throw "vcpkg bootstrap failed after $maxAttempts attempts"
              }
              Start-Sleep -Seconds (10 * $i)
            }
          }

      - name: Install dependencies via vcpkg
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install portaudio libsndfile --triplet x64-windows

      - name: Configure
        shell: pwsh
        run: |
          cmake -S bass-nuker-qt -B build `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -A x64

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BassNuker-windows
          path: build/Release/
